<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>langs.js.org</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  display:grid;
  place-items:center;
  font-family:system-ui,sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  transition:background .2s ease-out;
  overflow:hidden;
  touch-action:none;
}
.wrap{
  position:relative;
  z-index:2;
  padding:0 20px;
  text-align:center;
}
h1{
  font-size:clamp(26px,6vw,52px);
  font-weight:700;
  background:radial-gradient(circle at 50% 50%,#fff,#a78bfa,#6366f1,transparent);
  background-size:200% 200%;
  background-clip:text;
  -webkit-background-clip:text;
  color:transparent;
  white-space:nowrap;
  transition:background-position .15s ease-out;
}
.subtitle{
  color:#a78bfa;
  margin-top:16px;
  font-size:clamp(16px,3vw,20px);
  opacity:0.9;
}
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
}
</style>
</head>
<body>
<canvas id="p"></canvas>
<div class="wrap">
  <h1 id="t">langs.js.org is coming soon</h1>
  <p class="subtitle">A JavaScript utility library & learning playground for beginners</p>
</div>
<script>
const c=document.getElementById('p'),x=c.getContext('2d'),t=document.getElementById('t');
let W=c.width=window.innerWidth,H=c.height=window.innerHeight,q=[];

window.addEventListener('resize',()=>{
  W=c.width=window.innerWidth;
  H=c.height=window.innerHeight;
});

function f(X,Y){
  for(let i=0;i<12;i++){
    q.push({
      x:X,
      y:Y,
      vx:(Math.random()-.5)*4,
      vy:(Math.random()-.5)*4,
      a:1,
      s:Math.random()*2+1
    });
  }
}

function loop(){
  x.clearRect(0,0,W,H);
  for(let i=0;i<q.length;i++){
    const o=q[i];
    o.x+=o.vx;
    o.y+=o.vy;
    o.a-=.015;
    if(o.a<=0){
      q.splice(i,1);
      i--;
      continue;
    }
    x.globalAlpha=o.a;
    x.fillStyle='#a78bfa';
    x.beginPath();
    x.arc(o.x,o.y,o.s,0,Math.PI*2);
    x.fill();
  }
  requestAnimationFrame(loop);
}
loop();

document.addEventListener('click',e=>f(e.clientX,e.clientY));
document.addEventListener('touchstart',e=>{
  const o=e.touches[0];
  f(o.clientX,o.clientY);
});

function move(X,Y){
  t.style.backgroundPosition=`${(X/W)*100}% ${(Y/H)*100}%`;
  const a=45+(X/W)*270;
  document.body.style.background=`linear-gradient(${a}deg,#0f172a,#1e293b)`;
}
window.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
document.addEventListener('touchmove',e=>{
  e.preventDefault();
  const o=e.touches[0];
  move(o.clientX,o.clientY);
});
</script>
</body>
</html>
